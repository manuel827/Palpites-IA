<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SOCCER-PRO</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- REACT -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- BABEL -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: Poppins, sans-serif; }
  </style>

</head>

<body class="bg-[#0b0f1a]">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

  const [page,setPage] = useState("home");

  return(

    <div className="min-h-screen text-white pb-28">

      {/* HEADER PROFISSIONAL */}
      <div className="sticky top-0 z-50 backdrop-blur-xl bg-[#0b1220]/90 border-b border-white/10">

        <div className="flex justify-center items-center py-4">
          <div className="flex items-center gap-3">

            <span className="text-2xl">⚽</span>

            <h1 className="text-2xl font-bold tracking-[3px] text-green-400">
              SOCCER-PRO
            </h1>

            <span className="text-2xl">⚽</span>

          </div>
        </div>

        {/* NAVBAR */}
        <div className="flex justify-around py-3 bg-[#111827] border-t border-white/5">

          <button onClick={()=>setPage("home")} className="text-gray-300">🏠</button>
          <button onClick={()=>setPage("social")} className="text-gray-300">🔥</button>
          <button onClick={()=>setPage("terms")} className="text-gray-300">📜</button>

        </div>

      </div>

      {/* HOME */}
      {page === "home" && (

        <div className="p-5">

          <div className="bg-[#111827] border border-white/10 rounded-3xl p-6">

            <h1 className="text-3xl font-bold text-green-400 mb-3">
              Bem-vindo ao Soccer-Pro
            </h1>

            <p className="text-gray-400 leading-7">
              Plataforma profissional de análises esportivas e previsões automáticas.
            </p>

          </div>

        </div>

      )}

      {/* SOCIAL */}
      {page === "social" && (

        <div className="p-5 space-y-3">

          <h1 className="text-2xl text-green-400 font-bold">
            Prova Social
          </h1>

          <div className="bg-[#111827] border border-white/10 rounded-2xl p-4">
            🔥 João: “Ganhei 5 jogos seguidos”
          </div>

        </div>

      )}

      {/* TERMOS */}
      {page === "terms" && (

        <div className="p-5">

          <h1 className="text-2xl text-green-400 font-bold mb-3">
            Termos
          </h1>

          <p className="text-gray-400">
            Apenas previsões estatísticas, sem garantia de ganhos.
          </p>

        </div>

      )}

      {/* CALCULAR PALPITE (NOVA PÁGINA) */}
      {page === "calc" && (

        <div className="p-5 space-y-5">

          <h1 className="text-3xl font-bold text-green-400">
            📊 Calcular Palpite
          </h1>

          <p className="text-gray-400">
            Insere os dados do jogo para gerar análise automática.
          </p>

          {/* INPUTS */}
          <input
            id="teamA"
            placeholder="Equipa A"
            className="w-full p-4 rounded-2xl bg-[#111827] border border-white/10 focus:border-green-400 outline-none"
          />

          <input
            id="teamB"
            placeholder="Equipa B"
            className="w-full p-4 rounded-2xl bg-[#111827] border border-white/10 focus:border-green-400 outline-none"
          />

          {/* BOTÃO API */}
          <button
            onClick={async ()=>{

              const teamA = document.getElementById("teamA").value;
              const teamB = document.getElementById("teamB").value;

              if(!teamA || !teamB){
                alert("Preenche as duas equipas");
                return;
              }

              try{

                const res = await fetch(
                  `https://sua-api.com/palpites?teamA=${teamA}&teamB=${teamB}`
                );

                const data = await res.json();

                document.getElementById("result").innerHTML =
                  JSON.stringify(data, null, 2);

              }catch(e){
                document.getElementById("result").innerHTML =
                  "Erro na API ❌";
              }

            }}

            className="w-full py-4 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-400 font-bold text-lg shadow-xl"
          >
            📡 Enviar para API
          </button>

          {/* RESULTADO */}
          <div
            id="result"
            className="bg-[#111827] border border-white/10 rounded-2xl p-5 text-gray-300 whitespace-pre-wrap"
          >
            Resultado da API aparecerá aqui...
          </div>

        </div>

      )}

      {/* BOTÃO FIXO (LEVA PARA CALCULAR) */}
      <div className="fixed bottom-0 left-0 w-full bg-[#111827] border-t border-white/10 p-4">

        <button
          onClick={()=>setPage("calc")}
          className="w-full py-4 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-400 font-bold text-lg active:scale-95 transition"
        >
          📊 Calcular palpites do jogo
        </button>

      </div>

    </div>

  );

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
