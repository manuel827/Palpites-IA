<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SoccerPro Analytics</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: Inter, sans-serif; }
  </style>

</head>

<body class="bg-[#0a0f1c]">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

  const [page,setPage] = useState("home");

  const users = [
    "João","Ana","Carlos","Miguel","Sofia",
    "Pedro","Lucas","Marcos","Rita","Tiago",
    "Bruno","David","Inês","Paulo","Andreia"
  ];

  const messages = [
    "Melhor site de previsões!",
    "Muito preciso nos jogos!",
    "Já acertei vários palpites!",
    "Interface muito limpa!",
    "Gosto das análises!",
    "Top mesmo!",
    "Ajuda muito nas apostas!",
    "Sempre atualizado!",
    "Excelente plataforma!",
    "Funciona muito bem!",
    "Melhor que outros sites!",
    "Simples e eficaz!",
    "Uso todos os dias!",
    "Previsões muito boas!",
    "Recomendo totalmente!"
  ];

  return(

    <div className="min-h-screen text-white pb-28">

      {/* HEADER PROFISSIONAL */}
      <div className="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-xl border-b border-white/10">

        <div className="flex justify-center items-center py-4">

          <div className="flex items-center gap-3">

            <span className="text-xl">⚽</span>

            <h1 className="text-xl font-bold tracking-[4px] text-emerald-400">
              SOCCERPRO
            </h1>

            <span className="text-xl">⚽</span>

          </div>

        </div>

        {/* NAV */}
        <div className="flex justify-around py-3 border-t border-white/5">

          <button onClick={()=>setPage("home")} className="text-sm text-gray-300">Home</button>
          <button onClick={()=>setPage("social")} className="text-sm text-gray-300">Comunidade</button>
          <button onClick={()=>setPage("terms")} className="text-sm text-gray-300">Termos</button>

        </div>

      </div>

      {/* HOME DASHBOARD */}
      {page === "home" && (

        <div className="p-5 space-y-5">

          {/* HERO */}
          <div className="bg-gradient-to-br from-[#111827] to-[#0f172a] border border-white/10 rounded-3xl p-6">

            <h1 className="text-2xl font-bold text-emerald-400 mb-2">
              Calcula os palpites de futebol com o SOCCER-PRO
            </h1>

            <p className="text-gray-400 text-sm leading-6">
             palpites avançados de jogos, estatísticas e previsões baseadas em dados reais.
            </p>

          </div>

          {/* CARDS */}
          <div className="grid grid-cols-2 gap-3">

            <div className="bg-[#111827] border border-white/10 rounded-2xl p-4">
              <p className="text-gray-400 text-xs">Precisão</p>
              <p className="text-emerald-400 text-xl font-bold">92%</p>
            </div>

            <div className="bg-[#111827] border border-white/10 rounded-2xl p-4">
              <p className="text-gray-400 text-xs">Jogos</p>
              <p className="text-emerald-400 text-xl font-bold">+10K</p>
            </div>

          </div>

          {/* FEATURE */}
          <div className="bg-[#111827] border border-white/10 rounded-3xl p-5">

            <h2 className="text-lg font-semibold mb-2">
              Análise Inteligente
            </h2>

            <p className="text-gray-400 text-sm leading-6">
              Modelos estatísticos para prever golos, vitória, escanteios e cartões.
            </p>

          </div>

        </div>

      )}

      {/* CALCULAR */}
      {page === "calc" && (

        <div className="p-5 space-y-5">

          <h1 className="text-xl font-bold text-emerald-400">
            Máquina de previsão de jogos 
          </h1>

          <p className="text-gray-400 text-sm">
            Insere as equipas para gerar análise automática.
          </p>

          <input
            id="teamA"
            placeholder="Equipa Casa"
            className="w-full p-4 rounded-2xl bg-[#111827] border border-white/10"
          />

          <input
            id="teamB"
            placeholder="Equipa Fora"
            className="w-full p-4 rounded-2xl bg-[#111827] border border-white/10"
          />

          <button
            onClick={async ()=>{

              const teamA = document.getElementById("teamA").value;
              const teamB = document.getElementById("teamB").value;

              if(!teamA || !teamB){
                alert("Preenche as equipas");
                return;
              }

              try{

                const res = await fetch(
                  `https://sua-api.com/prediction?home=${teamA}&away=${teamB}`
                );

                const data = await res.json();

                document.getElementById("result").innerHTML =
                  JSON.stringify(data,null,2);

              }catch(err){
                document.getElementById("result").innerHTML =
                  "Erro na API";
              }

            }}

            className="w-full py-4 rounded-2xl bg-emerald-500 font-bold"
          >
            Calcular palpite do jogo 
          </button>

          <div
            id="result"
            className="bg-[#111827] border border-white/10 rounded-2xl p-5 text-gray-300 whitespace-pre-wrap"
          >
            
          </div>

        </div>

      )}

      {/* COMUNIDADE (SÓ AQUI MELHORADO) */}
      {page === "social" && (

        <div className="p-5 space-y-3">

          <h1 className="text-emerald-400 font-bold mb-4 text-lg">
            Comunidade
          </h1>

          {messages.map((msg,i)=>(
            <div
              key={i}
              className={`flex ${i % 2 === 0 ? "justify-start" : "justify-end"}`}
            >

              <div className={`max-w-[80%] px-4 py-3 rounded-2xl text-sm border border-white/10
                ${i % 2 === 0
                  ? "bg-[#111827] rounded-tl-none"
                  : "bg-emerald-500/10 rounded-tr-none text-right"
                }
              `}>

                <span className="block text-xs text-gray-400 mb-1">
                  {users[i]}
                </span>

                {msg}

              </div>

            </div>
          ))}

        </div>

      )}

      {/* TERMOS (SÓ MELHOR VISUAL) */}
      {page === "terms" && (

        <div className="p-5 space-y-4">

          <h1 className="text-emerald-400 font-bold text-lg">
            Termos de Uso
          </h1>

          {[
            "As previsões são baseadas em modelos estatísticos e não garantem resultados.",
            "O futebol é imprevisível e pode mudar por fatores externos.",
            "Nenhum resultado deve ser considerado garantido.",
            "O utilizador assume total responsabilidade pelas decisões.",
            "A plataforma não se responsabiliza por perdas financeiras."
          ].map((t,i)=>(
            <div
              key={i}
              className="bg-[#111827] border border-white/10 rounded-2xl p-4 text-sm text-gray-300 leading-7"
            >
              {t}
            </div>
          ))}

        </div>

      )}
      {/* BOTTOM CTA */}
      <div className="fixed bottom-0 left-0 w-full bg-[#0f172a] border-t border-white/10 p-4">

        <button
          onClick={()=>setPage("calc")}
          className="w-full py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-green-400 font-bold"
        >
          Calcular palpites do jogo
        </button>

      </div>

    </div>

  );

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
