<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SOCCER-PRO</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body{
      font-family:'Poppins',sans-serif;
    }
  </style>

</head>

<body class="bg-[#060b16]">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

  const [page,setPage] = useState("home");

  return(

    <div className="min-h-screen text-white pb-32">

      {/* HEADER */}

        <div className="flex items-center justify-center py-4">

          <div className="flex items-center gap-3">

              ⚽
            </div>

            <h1 className="text-2xl font-bold tracking-[3px] bg-gradient-to-r from-green-400 to-emerald-300 bg-clip-text text-transparent">
              SOCCER-PRO

            <div className="w-10 h-10 rounded-full bg-green-500/20 border border-green-400 flex items-center justify-center text-xl shadow-lg shadow-green-500/20">
              ⚽
            </div>

          </div>

        </div>

        {/* NAVBAR 2 */}
        <div className="flex justify-around items-center py-3 border-t border-white/5 bg-[#111827]/80">

          <button
            onClick={()=>setPage("home")}
            className={`flex flex-col items-center gap-1 transition-all duration-300 ${
              page === "home"
              ? "text-green-400 scale-105"
              : "text-gray-400"
            }`}
          >
            <span className="text-xl">🏠</span>
            <span className="text-xs font-medium">Home</span>
          </button>

          <button
            onClick={()=>setPage("social")}
            className={`flex flex-col items-center gap-1 transition-all duration-300 ${
              page === "social"
              ? "text-green-400 scale-105"
              : "text-gray-400"
            }`}
          >
            <span className="text-xl">🔥</span>
            <span className="text-xs font-medium">Prova Social</span>
          </button>

          <button
            onClick={()=>setPage("terms")}
            className={`flex flex-col items-center gap-1 transition-all duration-300 ${
              page === "terms"
              ? "text-green-400 scale-105"
              : "text-gray-400"
            }`}
          >
            <span className="text-xl">📜</span>
            <span className="text-xs font-medium">Termos</span>

        </div>

      </div>

      {/* HOME */}
      {page === "home" && (

            <div className="absolute -top-10 -right-10 w-40 h-40 bg-green-500/20 blur-3xl rounded-full"></div>

                Calcula os melhores
                <span className="text-green-400"> palpites </span>

              </h1>

              <p className="text-gray-400 leading-7 text-[15px]">

                golos, escanteios e cartões.
              </p>

            </div>

            <div className="bg-[#111827] border border-white/10 rounded-2xl p-4 text-center">

            </div>

            <div className="bg-[#111827] border border-white/10 rounded-2xl p-4 text-center">
              <h2 className="text-2xl font-bold text-green-400">+50K</h2>
              <p className="text-gray-400 text-xs mt-1">
                Utilizadores
              </p>
            </div>

            <div className="bg-[#111827] border border-white/10 rounded-2xl p-4 text-center">
              <h2 className="text-2xl font-bold text-green-400">24H</h2>
              <p className="text-gray-400 text-xs mt-1">
                Atualizações
              </p>
            </div>

          </div>

          {/* FEATURES */}

            <div className="bg-[#111827] border border-white/10 rounded-3xl p-5 shadow-lg">

                <div>

                  <h3 className="text-lg font-semibold mb-2">

                  <p className="text-gray-400 text-sm leading-6">
                    Calcula automaticamente vitórias,
                    golos, cantos e cartões com base
                    em estatísticas reais.
                  </p>

                </div>

              </div>

            </div>

            <div className="bg-[#111827] border border-white/10 rounded-3xl p-5 shadow-lg">

              <div className="flex items-start gap-4">

                <div className="w-14 h-14 rounded-2xl bg-green-500/10 border border-green-500/20 flex items-center justify-center text-2xl">
                  ⚽
                </div>

                <div>

                  <h3 className="text-lg font-semibold mb-2">
                    Jogos em Tempo Real
                  </h3>

                  <p className="text-gray-400 text-sm leading-6">
                    Dados esportivos atualizados automaticamente
                    para gerar previsões profissionais.
                  </p>

                </div>

              </div>

            </div>

          </div>

        </div>

      )}

      {/* PROVA SOCIAL */}

        <div className="p-5 space-y-4">

          <h1 className="text-3xl font-bold">
            Prova Social

              <div>
                <h2 className="font-semibold">João Pedro</h2>
                <p className="text-gray-500 text-sm">
                  há 2 horas
                </p>
              </div>

            </div>

            <p className="text-gray-300 leading-7">
              Acertei 5 jogos seguidos usando os cálculos do Soccer-Pro 🔥
            </p>

          </div>

            <div className="flex items-center gap-3 mb-3">

              <div className="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center font-bold">

              <div>
                <h2 className="font-semibold">Ana Silva</h2>
                <p className="text-gray-500 text-sm">
                  há 5 horas
                </p>

            <p className="text-gray-300 leading-7">
              Interface linda e palpites muito precisos ⚽
            </p>

          </div>

        </div>

      )}

        <div className="p-5">

          <div className="bg-[#111827] border border-white/10 rounded-3xl p-6">

            <h1 className="text-3xl font-bold mb-5">
              Termos de Uso
            </h1>

            <p className="text-gray-400 leading-8 text-[15px]">

              esportivas apenas para fins informativos. Não garantimos
              ganhos financeiros nem resultados específicos em apostas.
            </p>

          </div>

        </div>

      )}

      {/* BOTTOM BUTTON */}
      <div className="fixed bottom-0 left-0 w-full p-4 backdrop-blur-xl bg-[#0b1220]/90 border-t border-white/10 z-50">

        <button className="w-full py-5 rounded-[22px] bg-gradient-to-r from-green-500 to-emerald-400 text-white text-lg font-bold shadow-2xl shadow-green-500/20 active:scale-95 transition-all duration-300">

          📊 Calcular palpites do jogo

        </button>

      </div>

    </div>

  )

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />)

</script>

</body>
</html>
