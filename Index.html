<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>SoccerPro Analytics</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-[#0a0f1c]">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

  const [page,setPage] = useState("home");

  return(

    <div className="min-h-screen text-white pb-28">

      {/* HEADER */}
      <div className="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-xl border-b border-white/10">

        <div className="flex justify-center items-center py-4">
          <h1 className="text-xl font-bold tracking-[4px] text-emerald-400">
            SOCCERPRO ⚽
          </h1>
        </div>

        <div className="flex justify-around py-3 border-t border-white/5">

          <button onClick={()=>setPage("home")} className="text-sm text-gray-300">Home</button>
          <button onClick={()=>setPage("social")} className="text-sm text-gray-300">Comunidade</button>
          <button onClick={()=>setPage("terms")} className="text-sm text-gray-300">Termos</button>

        </div>

      </div>

      {/* HOME */}
      {page === "home" && (
        <div className="p-5">
          <h1 className="text-emerald-400 font-bold text-xl">Dashboard</h1>
        </div>
      )}

      {/* COMUNIDADE (15 PESSOAS) */}
      {page === "social" && (

        <div className="p-5 space-y-3">

          <h1 className="text-emerald-400 font-bold mb-3">
            Comunidade
          </h1>

          {[
            "João: Melhor site de previsões!",
            "Ana: Muito preciso nos jogos!",
            "Carlos: Já acertei vários palpites!",
            "Miguel: Interface muito limpa!",
            "Sofia: Gosto das análises!",
            "Pedro: Top mesmo!",
            "Lucas: Ajuda muito nas apostas!",
            "Marcos: Sempre atualizado!",
            "Rita: Excelente plataforma!",
            "Tiago: Funciona muito bem!",
            "Bruno: Melhor que outros sites!",
            "David: Simples e eficaz!",
            "Inês: Uso todos os dias!",
            "Paulo: Previsões muito boas!",
            "Andreia: Recomendo totalmente!"
          ].map((msg,i)=>(
            <div key={i} className="bg-[#111827] p-4 rounded-2xl border border-white/10">
              {msg}
            </div>
          ))}

        </div>

      )}

      {/* TERMOS (5 PARÁGRAFOS) */}
      {page === "terms" && (

        <div className="p-5 space-y-4 text-gray-300 text-sm leading-7">

          <h1 className="text-emerald-400 font-bold text-lg mb-2">
            Termos de Uso
          </h1>

          <p>
            As previsões fornecidas por esta plataforma são baseadas em análises estatísticas e modelos probabilísticos. Não representam resultados garantidos.
          </p>

          <p>
            O futebol é um desporto imprevisível, e variáveis externas podem influenciar diretamente o resultado de qualquer jogo.
          </p>

          <p>
            Nenhuma previsão deve ser interpretada como certeza absoluta de vitória, empate ou derrota.
          </p>

          <p>
            O utilizador deve entender que qualquer decisão baseada nestas análises é feita por sua própria responsabilidade.
          </p>

          <p>
            Esta plataforma não assume responsabilidade por perdas financeiras ou decisões tomadas com base nas previsões apresentadas.
          </p>

        </div>

      )}

      {/* BOTTOM */}
      <div className="fixed bottom-0 left-0 w-full bg-[#0f172a] border-t border-white/10 p-4">

        <button
          onClick={()=>setPage("calc")}
          className="w-full py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-green-400 font-bold"
        >
          ⚽ Analisar Jogo
        </button>

      </div>

    </div>

  );

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
